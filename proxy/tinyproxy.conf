User tinyproxy
Group tinyproxy
Port 8888
Listen 0.0.0.0
Timeout 600
DefaultErrorFile "/usr/share/tinyproxy/default.html"
StatFile "/usr/share/tinyproxy/stats.html"
LogLevel Info
MaxClients 100

# CONNECT (HTTPS) destination ports
ConnectPort 443
ConnectPort 80

# Domain-based filtering. The allowlist is regenerated by /entrypoint.sh
Filter "/etc/proxy/filter.txt"
FilterDefaultDeny Yes
FilterExtended On
FilterURLs Off
