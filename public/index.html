<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>dev-agent</title>
<style>
  :root {
    --bg: #0e1014;
    --panel: #15181f;
    --panel-2: #1b1f28;
    --fg: #e6e6e6;
    --muted: #8a93a6;
    --accent: #7aa2f7;
    --warn: #e0af68;
    --ok: #9ece6a;
    --err: #f7768e;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 14px;
    display: flex; flex-direction: column;
  }
  header {
    padding: 10px 16px; border-bottom: 1px solid #222;
    display: flex; align-items: baseline; gap: 12px;
  }
  header h1 { font-size: 14px; font-weight: 600; margin: 0; }
  header .desc { color: var(--muted); font-size: 12px; }
  #menu-toggle {
    display: none; background: transparent; border: 1px solid #2a2f3a;
    color: var(--fg); border-radius: 6px; padding: 4px 10px; cursor: pointer;
    font-size: 16px; line-height: 1;
  }
  main { flex: 1; display: flex; min-height: 0; position: relative; }
  aside {
    width: 260px; border-right: 1px solid #222; background: var(--panel);
    display: flex; flex-direction: column; min-height: 0;
  }
  .scrim {
    display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.5); z-index: 4;
  }
  aside .actions { padding: 10px; border-bottom: 1px solid #222; }
  aside .list { overflow-y: auto; flex: 1; }
  aside .session {
    padding: 10px 12px; border-bottom: 1px solid #1c1f27; cursor: pointer;
  }
  aside .session.active { background: var(--panel-2); }
  aside .session .title { font-weight: 500; }
  aside .session .meta { color: var(--muted); font-size: 11px; margin-top: 2px; }

  section.chat { flex: 1; display: flex; flex-direction: column; min-height: 0; }
  .messages { flex: 1; overflow-y: auto; padding: 16px 24px; }
  .msg { margin-bottom: 16px; max-width: 900px; }
  .msg .role { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
  .msg .content { white-space: pre-wrap; word-break: break-word; }
  .msg.user .content { color: var(--fg); }
  .msg.assistant .content { color: #d8e0f0; }
  .msg.tool .content { font-family: ui-monospace, Menlo, monospace; font-size: 12px; color: var(--muted); }
  details.tool {
    background: var(--panel-2); border: 1px solid #222; border-radius: 6px; padding: 6px 10px;
    margin-bottom: 8px; max-width: 900px;
  }
  details.tool summary { cursor: pointer; color: var(--muted); font-family: ui-monospace, Menlo, monospace; font-size: 12px; }
  details.tool pre { font-size: 12px; color: var(--fg); margin: 6px 0 0; white-space: pre-wrap; word-break: break-word; }

  .pr-banner {
    margin: 16px 24px 0; padding: 10px 14px; border-radius: 6px;
    background: #1f2a1f; border: 1px solid #3a5a3a; color: #cfe7c2;
    display: flex; gap: 16px; align-items: center;
  }
  .pr-banner img { height: 96px; }

  form.compose {
    display: flex; gap: 8px; padding: 12px 16px; border-top: 1px solid #222; background: var(--panel);
  }
  form.compose textarea {
    flex: 1; resize: vertical; min-height: 44px; max-height: 200px;
    background: var(--panel-2); color: var(--fg); border: 1px solid #2a2f3a;
    border-radius: 6px; padding: 8px 10px; font: inherit;
  }
  form.compose button {
    background: var(--accent); color: #0e1014; border: 0; border-radius: 6px;
    padding: 0 16px; font-weight: 600; cursor: pointer;
  }

  /* New-session modal */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    display: none; align-items: center; justify-content: center; z-index: 10;
  }
  .modal-bg.show { display: flex; }
  .modal {
    background: var(--panel); border: 1px solid #2a2f3a; border-radius: 8px;
    padding: 16px; width: min(720px, 92vw); display: flex; flex-direction: column; gap: 10px;
  }
  .modal h2 { margin: 0; font-size: 14px; }
  .modal input, .modal textarea {
    background: var(--panel-2); color: var(--fg); border: 1px solid #2a2f3a;
    border-radius: 6px; padding: 8px 10px; font: inherit;
  }
  .modal textarea { font-family: ui-monospace, Menlo, monospace; font-size: 12px; min-height: 240px; }
  .modal .row { display: flex; gap: 8px; justify-content: flex-end; }
  .modal button { background: var(--accent); color: #0e1014; border: 0; border-radius: 6px; padding: 8px 14px; font-weight: 600; cursor: pointer; }
  .modal button.ghost { background: transparent; color: var(--muted); }
  .empty { color: var(--muted); padding: 24px; text-align: center; }

  /* Mobile: sidebar becomes off-canvas drawer */
  @media (max-width: 720px) {
    header { padding: 8px 12px; gap: 8px; flex-wrap: wrap; }
    header h1 { font-size: 13px; }
    header .desc { font-size: 11px; }
    #project-mode { width: 100%; margin-left: 0 !important; }
    #menu-toggle { display: inline-block; }
    aside {
      position: absolute; z-index: 5; top: 0; bottom: 0; left: 0;
      width: min(280px, 80vw);
      transform: translateX(-100%);
      transition: transform 0.2s ease;
      box-shadow: 2px 0 12px rgba(0,0,0,0.4);
    }
    body.drawer-open aside { transform: translateX(0); }
    body.drawer-open .scrim { display: block; }
    .messages { padding: 12px 14px; }
    .msg, details.tool { max-width: 100%; }
    .pr-banner { margin: 12px 14px 0; padding: 8px 10px; flex-wrap: wrap; }
    .pr-banner img { height: 72px; }
    form.compose { padding: 8px 10px; gap: 6px; }
    form.compose textarea { min-height: 40px; font-size: 16px; /* prevents iOS zoom */ }
    form.compose button { padding: 0 12px; }
  }
</style>
</head>
<body>
  <header>
    <button id="menu-toggle" type="button" aria-label="Toggle sessions">☰</button>
    <h1 id="project-name">dev-agent</h1>
    <span class="desc" id="project-desc"></span>
    <span class="desc" id="project-mode" style="margin-left:auto;"></span>
  </header>
  <main>
    <div class="scrim" id="scrim"></div>
    <aside>
      <div class="actions">
        <button id="new-session-btn" style="width:100%;background:var(--accent);color:#0e1014;border:0;border-radius:6px;padding:8px;font-weight:600;cursor:pointer;">+ New session</button>
      </div>
      <div class="list" id="session-list"></div>
    </aside>
    <section class="chat">
      <div id="pr-banner" class="pr-banner" style="display:none;"></div>
      <div class="messages" id="messages">
        <div class="empty">Select or create a session to begin.</div>
      </div>
      <form class="compose" id="compose" style="display:none;">
        <textarea id="compose-input" placeholder="Ask the agent…"></textarea>
        <button type="submit">Send</button>
      </form>
    </section>
  </main>

  <div class="modal-bg" id="modal-bg">
    <div class="modal">
      <h2>New session</h2>
      <input id="new-title" placeholder="Title (optional)" />
      <textarea id="new-report" placeholder="Paste &lt;bug-report&gt;...&lt;/bug-report&gt; here (optional)"></textarea>
      <div class="row">
        <button class="ghost" id="new-cancel" type="button">Cancel</button>
        <button id="new-submit" type="button">Create</button>
      </div>
    </div>
  </div>

  <!-- ?v=DEV is rewritten by the server to a sha256 of app.js for cache-busting. -->
  <script src="/app.js?v=DEV"></script>
</body>
</html>
